{% extends "base.html" %}

{% block title %}Cadastrar Totem - LAB2 Webapp{% endblock %}

{% block content %}
  <section class="page-card card border-0 shadow-sm">
    <div class="card-body p-4 p-md-5">
      <span class="badge text-bg-primary mb-3">Cadastrar totem</span>
      <h1 class="h2 fw-bold mb-3">Cadastro de totem</h1>
      <p class="text-secondary mb-4">Tela inicial para registrar um novo totem de coleta.</p>

      <form class="row g-3">
        <div class="col-md-6">
          <label class="form-label" for="totem_name">Nome do totem</label>
          <input class="form-control" id="totem_name" type="text" placeholder="Totem Central" />
        </div>
        <div class="col-md-6">
          <label class="form-label" for="totem_code">Codigo do totem</label>
          <input class="form-control" id="totem_code" type="text" placeholder="TOTEM-001" />
        </div>
        <div class="col-12">
          <label class="form-label" for="totem_address">Endereco</label>
          <input class="form-control" id="totem_address" type="text" placeholder="Rua Exemplo, 123" />
        </div>
        <div class="col-12">
          <button class="btn btn-primary" type="button">Salvar totem</button>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
