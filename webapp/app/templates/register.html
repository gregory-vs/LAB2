{% extends "base.html" %}

{% block title %}Register - LAB2 Webapp{% endblock %}

{% block content %}
  <section class="auth-wrapper">
    <div class="card shadow-sm border-0 auth-card">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 fw-bold mb-3 text-center">Register</h1>
        <p class="text-secondary text-center mb-4">Cadastro mockado com redirecionamento para home.</p>

        <form method="post" action="{{ url_for('home.submit_register') }}">
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" id="username" name="username" type="text" required />
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required />
          </div>

          <div class="mb-4">
            <label class="form-label" for="password_confirmation">Password confirmation</label>
            <input
              class="form-control"
              id="password_confirmation"
              name="password_confirmation"
              type="password"
              required
            />
          </div>

          <button class="btn btn-primary w-100" type="submit">Send</button>
        </form>
      </div>
    </div>
  </section>
{% endblock %}
