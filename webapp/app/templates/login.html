{% extends "base.html" %}

{% block title %}Login - LAB2 Webapp{% endblock %}

{% block content %}
  <section class="auth-wrapper">
    <div class="card shadow-sm border-0 auth-card">
      <div class="card-body p-4 p-md-5">
        <h1 class="h3 fw-bold mb-3 text-center">Login</h1>
        <p class="text-secondary text-center mb-4">Acesso mockado para entrar na aplicacao.</p>

        <form method="post" action="{{ url_for('home.submit_login') }}">
          <div class="mb-3">
            <label class="form-label" for="login">Login</label>
            <input class="form-control" id="login" name="login" type="text" required />
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required />
          </div>

          <button class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>

        <p class="text-center mb-0 mt-4">
          Nao tem conta?
          <a href="{{ url_for('home.register') }}">Cadastrar</a>
        </p>
      </div>
    </div>
  </section>
{% endblock %}
